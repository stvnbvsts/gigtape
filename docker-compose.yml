services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      GIN_MODE: release
      PORT: "8080"
      SPOTIFY_REDIRECT_URI: http://127.0.0.1:8080/auth/callback
      WEB_REDIRECT_URL: http://localhost:5173/
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5173:8080"
